name: Tests

on:
  push:
    branches: [main]
    paths:
      - "mcp-guardian/**"
  pull_request:
    branches: [main]
    paths:
      - "mcp-guardian/**"

defaults:
  run:
    working-directory: mcp-guardian

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
